<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Tutor">
  <!-- Tutor PWA icon: flat indigo tile with a paper "T" bookmark. Brand: paper #faf9f6 / indigo #4f46e5. -->
  <rect width="512" height="512" rx="112" fill="#4f46e5"/>
  <!-- Serifed "T" in paper, reads as a book/bookmark mark -->
  <g fill="#faf9f6">
    <!-- crossbar -->
    <rect x="128" y="150" width="256" height="56" rx="14"/>
    <!-- stem -->
    <rect x="228" y="150" width="56" height="232" rx="14"/>
  </g>
</svg>
